name: Convert Notebook to HTML

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # checkout repo
      - uses: actions/checkout@v3

      # set up python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # nvbconvert (converting .ipynb to .html)
      - name: Install nbconvert
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert

      # run nbconvert (using existing outputs)
      - name: Convert notebooks
        run: |
          mkdir -p docs
          jupyter nbconvert --to html notebooks/*.ipynb --output-dir docs

      # commit HTML to repo
      - name: Commit converted HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add html/*.html
          git commit -m "Update notebook HTML outputs" || echo "No changes to commit"
          git push
