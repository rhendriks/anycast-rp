name: Build and deploy to GitHub Pages

on:
  # run on push or from actions tab
  push:
    branches: [main]

  workflow_dispatch:

# perms for github pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbconvert

      - name: Convert notebook to HTML
        run: |
          mkdir -p docs
          jupyter nbconvert --to html rp_analysis.ipynb --output-dir docs --output rp_analysis.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # upload docs
          path: './docs'

  deploy:
    # dependency on build step
    needs: build

    # get permissions to deploy to pages
    permissions:
      pages: write
      id-token: write

    # deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # specify runner and deployment steps
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
